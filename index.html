<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b5fff" />
  <title>RedeCalc Pro GPS</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>RedeCalc Pro GPS</h1>
    <span id="status">Offline pronto</span>
  </header>

  <main>
    <section class="card grid">
      <label>Nome do projeto <input id="projectName" value="Projeto de Rede" /></label>
      <label>Responsável <input id="responsavel" placeholder="Nome do responsável" /></label>
      <label>Cargo <input id="cargo" placeholder="Cargo" /></label>
      <label>Nome do ponto <input id="pointName" placeholder="P01" /></label>
      <label>Tipo de rede
        <select id="networkType"><option value="MT">MT - Média tensão</option><option value="BT">BT - Baixa tensão</option></select>
      </label>
      <label>Estrutura
        <select id="estrutura"></select>
      </label>
      <label>Poste
        <select id="poste"><option>Poste novo</option><option>Poste existente</option></select>
      </label>
      <label>Cabo MT
        <select id="caboMT"></select>
      </label>
      <label>Cabo BT
        <select id="caboBT"></select>
      </label>
      <label>Equipamento
        <select id="equipamento"></select>
      </label>
      <label>Comentário do ponto <input id="comentario" placeholder="Observações" /></label>
    </section>

    <section class="card actions">
      <button id="btnGps">Adicionar ponto GPS</button>
      <button id="btnWatch">Iniciar GPS em tempo real</button>
      <button id="btnManual">Adicionar ponto manual</button>
      <button id="btnPhoto">Adicionar foto/evidência</button>
      <button id="btnFolder">Escolher pasta</button>
      <button id="btnClear" class="danger">Limpar projeto</button>
    </section>

    <section class="card manual" id="manualBox">
      <label>Latitude <input id="latManual" type="number" step="any" /></label>
      <label>Longitude <input id="lngManual" type="number" step="any" /></label>
    </section>

    <section class="card stats">
      <b>Distância total:</b> <span id="totalDist">0 m</span>
      <b>Última posição:</b> <span id="lastPos">sem GPS</span>
    </section>

    <section class="card mapWrap">
      <canvas id="map" width="1200" height="700"></canvas>
      <p class="hint">Desenho automático offline: MT vermelha tracejada, BT azul contínua, poste existente preto.</p>
    </section>

    <section class="card">
      <h2>Fotos e evidências</h2>
      <input id="photoInput" type="file" accept="image/*" capture="environment" hidden />
      <div id="photos"></div>
    </section>

    <section class="card">
      <h2>Assinatura digital</h2>
      <canvas id="signature" width="700" height="220"></canvas>
      <div class="actions"><button id="btnClearSign">Limpar assinatura</button></div>
    </section>

    <section class="card">
      <h2>Pontos lançados</h2>
      <div class="tableWrap"><table id="pointsTable"></table></div>
    </section>

    <section class="card actions export">
      <button id="pdfPrancha">Prancha PDF</button>
      <button id="pdfMemorial">Memorial PDF</button>
      <button id="pdfMateriais">Lista de materiais PDF</button>
      <button id="pdfEvidencias">Evidências PDF</button>
      <button id="exportCsv">CSV</button>
      <button id="exportJson">JSON</button>
      <button id="exportDxf">DXF</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
